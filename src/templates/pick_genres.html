<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Genre — Matchinema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --accent: #e8c547;
            --accent2: #ff6b35;
            --text: #f0ede6;
            --muted: #ffffff;
            --border: #2a2a3a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb-1 { width: 500px; height: 500px; background: rgba(232,197,71,0.06); top: -100px; left: -100px; }
        .glow-orb-2 { width: 400px; height: 400px; background: rgba(255,107,53,0.05); bottom: 0; right: -100px; }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px 60px;
            position: relative;
            z-index: 1;
        }

        header {
            padding: 48px 0 52px;
            text-align: center;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 44px;
            letter-spacing: 0.06em;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 0.06em;
            color: var(--text);
            margin-bottom: 10px;
        }

        .page-sub {
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto;
        }

        /* ── GENRE GRID ── */
        .genre-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Hidden real checkbox */
        .genre-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        /* Custom pill */
        .genre-item label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 400;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.18s ease;
            user-select: none;
        }

        .genre-item label:hover {
            border-color: rgba(232,197,71,0.4);
            color: var(--text);
        }

        /* Checked state */
        .genre-item input[type="checkbox"]:checked + label {
            background: rgba(232,197,71,0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .genre-item input[type="checkbox"]:checked + label::before {
            content: '✓';
            font-size: 11px;
        }

        /* ── SELECTED COUNTER ── */
        .counter-bar {
            position: sticky;
            bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            gap: 16px;
            backdrop-filter: blur(12px);
            animation: slideUp 0.3s 0.2s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .counter-text {
            font-size: 13px;
            color: var(--muted);
        }

        .counter-text strong {
            color: var(--accent);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 0.04em;
            vertical-align: middle;
            margin-right: 4px;
        }

        .counter-hint {
            font-size: 11px;
            color: var(--muted);
            font-style: italic;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            padding: 13px 28px;
            color: #0a0a0f;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-submit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-submit:not(:disabled):active { transform: translateY(0); }

        @media (max-width: 480px) {
            .counter-bar { flex-direction: column; align-items: stretch; }
            .btn-submit { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container">
        <header>
            <div class="logo">Matchinema</div>
            <div class="page-title">Apa genre favoritmu?</div>
            <p class="page-sub">Pilih satu atau lebih genre. Kami akan merekomendasikan film-film terbaik berdasarkan pilihanmu.</p>
        </header>

        <form method="POST" action="/pick-genres" id="genre-form">
            <div class="genre-grid">
                {% for genre in all_genres %}
                <div class="genre-item">
                    <input
                        type="checkbox"
                        name="genres"
                        value="{{ genre }}"
                        id="genre_{{ loop.index }}"
                        onchange="updateCounter()"
                    />
                    <label for="genre_{{ loop.index }}">{{ genre }}</label>
                </div>
                {% endfor %}
            </div>

            <!-- Sticky bottom bar -->
            <div class="counter-bar">
                <div>
                    <div class="counter-text"><strong id="count">0</strong> genre dipilih</div>
                    <div class="counter-hint">Pilih minimal 1 genre untuk melanjutkan</div>
                </div>
                <button type="submit" class="btn-submit" id="btn-lanjut" disabled>
                    Lihat Rekomendasi →
                </button>
            </div>
        </form>
    </div>

    <script>
        function updateCounter() {
            const checked = document.querySelectorAll('input[name="genres"]:checked').length;
            document.getElementById('count').textContent = checked;
            document.getElementById('btn-lanjut').disabled = checked === 0;
        }
    </script>
</body>
</html>
